<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Travel Planner</title>

    <link rel="stylesheet" href="/static/css/style.css" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <div class="container">

        <!-- Login Section -->
        <div id="login" class="section active">
            <img class="logo" src="/static/css/logo.png" alt="Travel Logo" />
            <h2>Login Page</h2>
            <form onsubmit="login(event)">
                <input type="text" id="email" placeholder="Email ID / Phone" required />
                <input type="password" id="password" placeholder="Password" required />
                <button type="submit">Log In</button>
            </form>
            <p class="link-text" onclick="showRegister()">Don't have an account? Register now</p>
        </div>

        <!-- Register Section -->
        <div id="register" class="section">
            <img class="logo" src="/static/css/logo.png" alt="Travel Logo" />
            <h2>Register</h2>
            <form onsubmit="register(event)">
                <input type="text" id="reg-email" placeholder="Email ID" required />
                <input type="password" id="reg-password" placeholder="Password" required />
                <input type="password" id="reg-confirm-password" placeholder="Confirm Password" required />
                <button type="submit">Create Account</button>
            </form>
            <p class="link-text" onclick="showLogin()">Already have an account? Log in</p>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="section">
            <div class="top-bar">
                <div id="welcomeText">Welcome back!</div>
                <button type="button" onclick="logout()" class="logout-button">Logout</button>
            </div>
            <img src="/static/images/user.png" alt="User Icon" />
            <h2>Dashboard</h2>
            <input type="text" id="place" placeholder="Place" />
            <input type="number" id="days" placeholder="No. of Days" />
            <input type="number" id="budget" placeholder="Budget (K)" />
            <input type="text" id="transport" placeholder="Transportation Mode (car/train/flight/metro)" />
            <button onclick="askAI()">Ask the AI</button>
            <button id="downloadButton" class="download-button" onclick="downloadItinerary()" style="display:none;">Download Itinerary</button>

            <div class="plans" id="plans">
                <!-- Generated plans will appear here -->
            </div>

            <button onclick="showRoute()">View Route Map</button>
        </div>

        <!-- Route Representation Section -->
        <div id="route" class="section">
            <h2>Route Representation</h2>
            <div class="route-tabs">
                <button id="tab-stay" class="active" onclick="showTab('stay')">Stay</button>
                <button id="tab-food" onclick="showTab('food')">Food</button>
                <button id="tab-medical" onclick="showTab('medical')">Medical</button>
                <button id="tab-transport" onclick="showTab('transport')">Transport</button>
            </div>

            <!-- Map Container -->
            <div id="map"></div>
            <div class="route-info" id="route-details"></div>
            <div class="route-category-content" id="route-category-content"></div>

            <div class="chatbot" id="chatbot">
                Chat Bot Area
            </div>
            <button onclick="backToDashboard()">Back to Dashboard</button>
        </div>

    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- Your custom JavaScript -->
    <script src="/static/js/script.js"></script>
</body>
</html>
